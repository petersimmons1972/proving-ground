<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 280">

  <!-- ============================================================
       PAINT ORDER: 1-backgrounds, 2-geometry, 3-strokes, 4-text
       ============================================================ -->

  <!-- 1. BACKGROUNDS -->
  <rect width="720" height="280" fill="#0A0F1E"/>

  <!-- 2. GEOMETRY -- all rects, rules, bands before any text -->

  <!-- Amber top accent bar -->
  <rect x="0" y="0" width="720" height="4" fill="#F59E0B"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="718" height="278" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Corner registration ticks -->
  <line x1="10" y1="4"  x2="10" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="10" x2="14" y2="10"  stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="4"  x2="710" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="10" x2="716" y2="10"  stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="276" x2="10" y2="266"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="270" x2="14" y2="270"  stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="276" x2="710" y2="266"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="270" x2="716" y2="270"  stroke="#374151" stroke-width="1"/>

  <!-- ---- CARD 1: ZERO  x=20, y=38, w=200, h=216 ---- -->
  <rect x="20" y="38" width="200" height="216" fill="#0D1117"/>
  <!-- top color band 8px -->
  <rect x="20" y="38" width="200" height="8" fill="#64748B"/>
  <!-- Card divider rules within card -- y positions relative to card top=38 -->
  <!-- Spec row dividers at y=112, 132, 152, 172 (each row 20px) -->
  <line x1="20" y1="112" x2="220" y2="112" stroke="#1F2937" stroke-width="1"/>
  <line x1="20" y1="132" x2="220" y2="132" stroke="#1F2937" stroke-width="1"/>
  <line x1="20" y1="152" x2="220" y2="152" stroke="#1F2937" stroke-width="1"/>
  <line x1="20" y1="172" x2="220" y2="172" stroke="#1F2937" stroke-width="1"/>
  <!-- Card border -->
  <rect x="20" y="38" width="200" height="216" fill="none" stroke="#374151" stroke-width="1"/>

  <!-- ---- CARD 2: LIGHT  x=260, y=38, w=200, h=216 ---- -->
  <rect x="260" y="38" width="200" height="216" fill="#0D1117"/>
  <!-- top color band -->
  <rect x="260" y="38" width="200" height="8" fill="#22D3EE"/>
  <!-- dividers -->
  <line x1="260" y1="112" x2="460" y2="112" stroke="#1F2937" stroke-width="1"/>
  <line x1="260" y1="132" x2="460" y2="132" stroke="#1F2937" stroke-width="1"/>
  <line x1="260" y1="152" x2="460" y2="152" stroke="#1F2937" stroke-width="1"/>
  <line x1="260" y1="172" x2="460" y2="172" stroke="#1F2937" stroke-width="1"/>
  <!-- Card border -->
  <rect x="260" y="38" width="200" height="216" fill="none" stroke="#374151" stroke-width="1"/>

  <!-- ---- CARD 3: PROFILED  x=500, y=38, w=200, h=216 ---- -->
  <rect x="500" y="38" width="200" height="216" fill="#0D1117"/>
  <!-- top color band -->
  <rect x="500" y="38" width="200" height="8" fill="#F59E0B"/>
  <!-- dividers -->
  <line x1="500" y1="112" x2="700" y2="112" stroke="#1F2937" stroke-width="1"/>
  <line x1="500" y1="132" x2="700" y2="132" stroke="#1F2937" stroke-width="1"/>
  <line x1="500" y1="152" x2="700" y2="152" stroke="#1F2937" stroke-width="1"/>
  <line x1="500" y1="172" x2="700" y2="172" stroke="#1F2937" stroke-width="1"/>
  <!-- Card border -->
  <rect x="500" y="38" width="200" height="216" fill="none" stroke="#374151" stroke-width="1"/>

  <!-- Bottom rule -->
  <line x1="20" y1="258" x2="700" y2="258" stroke="#1F2937" stroke-width="1"/>

  <!-- 3. STROKES -- embedded above -->

  <!-- 4. TEXT -- always last -->

  <!-- Header -->
  <text x="360" y="24" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="3" fill="#374151" text-anchor="middle">
    CONFIGURATION SPECIFICATIONS -- SUITE v1
  </text>

  <!-- ==== CARD 1: ZERO text ==== -->
  <!-- Config label -->
  <text x="120" y="58" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="3" fill="#64748B" text-anchor="middle">
    CONFIGURATION I
  </text>
  <!-- Large label -->
  <text x="120" y="96" font-family="Courier New, Courier, monospace" font-size="22"
        letter-spacing="6" fill="#64748B" text-anchor="middle">
    ZERO
  </text>
  <!-- Spec rows: label at card-left+8, value at card-right-8
       Row 1 y=122 (between y=112 and y=132)
       Row 2 y=142
       Row 3 y=162
       Row 4 y=182 -->
  <text x="28" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    SYSTEM PROMPT
  </text>
  <text x="212" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="end">
    NONE
  </text>
  <text x="28" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    PRIORS
  </text>
  <text x="212" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="end">
    NONE
  </text>
  <text x="28" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    DECISION BASIS
  </text>
  <text x="212" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="end">
    TASK SPEC ONLY
  </text>
  <text x="28" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    BASELINE
  </text>
  <text x="212" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="end">
    YES
  </text>
  <!-- Bottom caption -->
  <text x="120" y="244" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#374151" text-anchor="middle">
    CONTROL CONFIGURATION
  </text>

  <!-- ==== CARD 2: LIGHT text ==== -->
  <text x="360" y="58" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="3" fill="#22D3EE" text-anchor="middle">
    CONFIGURATION II
  </text>
  <text x="360" y="96" font-family="Courier New, Courier, monospace" font-size="22"
        letter-spacing="6" fill="#22D3EE" text-anchor="middle">
    LIGHT
  </text>
  <text x="268" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    SYSTEM PROMPT
  </text>
  <text x="452" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="end">
    3 SENTENCES
  </text>
  <text x="268" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    ROLE FRAMING
  </text>
  <text x="452" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="end">
    SR ENGINEER
  </text>
  <text x="268" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    DECISION BASIS
  </text>
  <text x="452" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="end">
    ASK FIRST
  </text>
  <text x="268" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    INDUSTRY DEFAULT
  </text>
  <text x="452" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="end">
    YES
  </text>
  <text x="360" y="244" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#374151" text-anchor="middle">
    SECOND CONTROL
  </text>

  <!-- ==== CARD 3: PROFILED text ==== -->
  <text x="600" y="58" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="3" fill="#F59E0B" text-anchor="middle">
    CONFIGURATION III
  </text>
  <text x="600" y="96" font-family="Courier New, Courier, monospace" font-size="22"
        letter-spacing="4" fill="#F59E0B" text-anchor="middle">
    PROFILED
  </text>
  <text x="508" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    SYSTEM PROMPT
  </text>
  <text x="692" y="124" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="end">
    FULL PROFILE
  </text>
  <text x="508" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    CHARACTER HISTORY
  </text>
  <text x="692" y="144" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="end">
    YES
  </text>
  <text x="508" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    FAILURE MODES
  </text>
  <text x="692" y="164" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="end">
    DOCUMENTED
  </text>
  <text x="508" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B">
    VARIABLE UNDER TEST
  </text>
  <text x="692" y="184" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="end">
    YES
  </text>
  <text x="600" y="244" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#94a3b8" text-anchor="middle">
    THE VARIABLE
  </text>

  <!-- Bottom centered caption -->
  <text x="360" y="272" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="2" fill="#64748B" text-anchor="middle">
    THE GAP BETWEEN LIGHT AND PROFILED IS WHAT YOUR PROFILE PRODUCES
  </text>

</svg>
