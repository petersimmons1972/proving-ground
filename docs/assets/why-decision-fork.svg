<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 320">

  <!-- ============================================================
       PAINT ORDER: 1-backgrounds, 2-geometry, 3-strokes, 4-text
       ============================================================ -->

  <!-- 1. BACKGROUNDS -->
  <rect width="720" height="320" fill="#0A0F1E"/>
  <!-- Panel bg for agent nodes and task box drawn with geometry below -->

  <!-- 2. GEOMETRY -->

  <!-- Amber top accent bar -->
  <rect x="0" y="0" width="720" height="4" fill="#F59E0B"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="718" height="318" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Corner registration ticks -->
  <!-- top-left -->
  <line x1="10" y1="4"  x2="10" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="10" x2="14" y2="10"  stroke="#374151" stroke-width="1"/>
  <!-- top-right -->
  <line x1="710" y1="4"  x2="710" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="10" x2="716" y2="10"  stroke="#374151" stroke-width="1"/>
  <!-- bottom-left -->
  <line x1="10" y1="316" x2="10" y2="306"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="310" x2="14" y2="310"  stroke="#374151" stroke-width="1"/>
  <!-- bottom-right -->
  <line x1="710" y1="316" x2="710" y2="306"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="310" x2="716" y2="310"  stroke="#374151" stroke-width="1"/>

  <!-- Task specification box bg (centered x=360, y=52, w=280, h=36 => x1=220) -->
  <rect x="220" y="52" width="280" height="36" fill="#111827"/>

  <!-- Task box border: 1px cyan -->
  <rect x="220" y="52" width="280" height="36" fill="none" stroke="#22D3EE" stroke-width="1"/>

  <!-- Fork vertical lines from bottom of task box (y=88) to agent nodes (y=140)
       Left fork: x=230 (center of ZERO node 180+50=230)
       Center fork: x=360 (center of LIGHT node 310+50=360)
       Right fork: x=490 (center of PROFILED node 440+50=490) -->
  <line x1="230" y1="88" x2="230" y2="140" stroke="#1F2937" stroke-width="1"/>
  <line x1="360" y1="88" x2="360" y2="140" stroke="#1F2937" stroke-width="1"/>
  <line x1="490" y1="88" x2="490" y2="140" stroke="#1F2937" stroke-width="1"/>

  <!-- Horizontal distributor line at y=88 connecting x=230 to x=490 -->
  <line x1="230" y1="88" x2="490" y2="88" stroke="#1F2937" stroke-width="1"/>

  <!-- Agent node backgrounds -->
  <!-- ZERO: x=180, y=140, w=100, h=48 -->
  <rect x="180" y="140" width="100" height="48" fill="#111827"/>
  <!-- LIGHT: x=310, y=140, w=100, h=48 -->
  <rect x="310" y="140" width="100" height="48" fill="#111827"/>
  <!-- PROFILED: x=440, y=140, w=100, h=48 -->
  <rect x="440" y="140" width="100" height="48" fill="#111827"/>

  <!-- Agent node borders -->
  <rect x="180" y="140" width="100" height="48" fill="none" stroke="#64748B" stroke-width="1"/>
  <rect x="310" y="140" width="100" height="48" fill="none" stroke="#22D3EE" stroke-width="1"/>
  <rect x="440" y="140" width="100" height="48" fill="none" stroke="#F59E0B" stroke-width="1"/>

  <!-- Output vertical lines from agent node bottoms (y=188) downward to y=222 -->
  <!-- ZERO output: x=230 -->
  <line x1="230" y1="188" x2="230" y2="222" stroke="#1F2937" stroke-width="1"/>
  <!-- LIGHT output: x=360 -->
  <line x1="360" y1="188" x2="360" y2="222" stroke="#1F2937" stroke-width="1"/>
  <!-- PROFILED output: x=490 -->
  <line x1="490" y1="188" x2="490" y2="222" stroke="#1F2937" stroke-width="1"/>

  <!-- Small arrowhead triangles at y=222 pointing down -->
  <!-- ZERO arrow: center x=230, tip y=228 -->
  <polygon points="230,228 225,221 235,221" fill="#1F2937"/>
  <!-- LIGHT arrow: center x=360, tip y=228 -->
  <polygon points="360,228 355,221 365,221" fill="#1F2937"/>
  <!-- PROFILED arrow: center x=490, tip y=228 -->
  <polygon points="490,228 485,221 495,221" fill="#1F2937"/>

  <!-- Result annotation boxes (minimal hairline) -->
  <!-- ZERO result: centered on x=230, y=232-->
  <rect x="168" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>
  <!-- LIGHT result: centered on x=360 -->
  <rect x="298" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>
  <!-- PROFILED result: centered on x=490 -->
  <rect x="428" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>

  <!-- Bottom rule -->
  <line x1="20" y1="292" x2="700" y2="292" stroke="#1F2937" stroke-width="1"/>

  <!-- SIGNAL FLOW label area bg (very subtle) -->

  <!-- 3. STROKES -- already embedded in geometry rects above -->

  <!-- 4. TEXT -- always last -->

  <!-- Header label -->
  <text x="360" y="24" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="3" fill="#374151" text-anchor="middle">
    APPARATUS DIAGRAM -- EXPERIMENTAL SETUP
  </text>

  <!-- Task specification box text -->
  <text x="360" y="68" font-family="Courier New, Courier, monospace" font-size="12"
        letter-spacing="2" fill="#22D3EE" text-anchor="middle">
    AMBIGUOUS TASK SPECIFICATION
  </text>
  <text x="360" y="82" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    [ IDENTICAL INPUT TO ALL THREE AGENTS ]
  </text>

  <!-- SIGNAL FLOW label centered below fork lines -->
  <text x="360" y="118" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="3" fill="#374151" text-anchor="middle">
    SIGNAL FLOW
  </text>

  <!-- Agent node labels -->
  <!-- ZERO -->
  <text x="230" y="160" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#64748B" text-anchor="middle">
    [ ZERO ]
  </text>
  <text x="230" y="176" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    no system prompt
  </text>

  <!-- LIGHT -->
  <text x="360" y="160" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#22D3EE" text-anchor="middle">
    [ LIGHT ]
  </text>
  <text x="360" y="176" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    3-sentence prompt
  </text>

  <!-- PROFILED -->
  <text x="490" y="160" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="2" fill="#F59E0B" text-anchor="middle">
    [ PROFILED ]
  </text>
  <text x="490" y="176" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="middle">
    full character
  </text>

  <!-- Result annotation text -->
  <!-- ZERO -->
  <text x="230" y="247" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    HEDGES. ASKS.
  </text>

  <!-- LIGHT -->
  <text x="360" y="247" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    ASKS. WAITS.
  </text>

  <!-- PROFILED -->
  <text x="490" y="247" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="middle">
    DECIDES. DOCUMENTS.
  </text>

  <!-- Judgment score callouts -->
  <text x="230" y="270" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    JUDGMENT: 6.0
  </text>
  <text x="360" y="270" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    JUDGMENT: 6.9
  </text>
  <text x="490" y="270" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="middle">
    JUDGMENT: 8.1
  </text>

  <!-- Bottom hypothesis line -->
  <text x="360" y="308" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="2" fill="#94a3b8" text-anchor="middle">
    HYPOTHESIS: THE PROFILE SUBSTITUTES JUDGMENT FOR HESITATION
  </text>

</svg>
