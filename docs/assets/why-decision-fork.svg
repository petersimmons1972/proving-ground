<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <rect width="720" height="320" fill="#0A0F1E"/>
  <rect width="720" height="4" fill="#F59E0B"/>
  <rect x="1" y="1" width="718" height="318" fill="none" stroke="#1F2937" stroke-width="1"/>
  <!-- corner ticks -->
  <line x1="10" y1="4" x2="10" y2="14" stroke="#374151" stroke-width="1"/>
  <line x1="4" y1="10" x2="14" y2="10" stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="4" x2="710" y2="14" stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="10" x2="716" y2="10" stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="316" x2="10" y2="306" stroke="#374151" stroke-width="1"/>
  <line x1="4" y1="310" x2="14" y2="310" stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="316" x2="710" y2="306" stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="310" x2="716" y2="310" stroke="#374151" stroke-width="1"/>
  <!-- task box -->
  <rect x="220" y="52" width="280" height="36" fill="#111827"/>
  <rect x="220" y="52" width="280" height="36" fill="none" stroke="#22D3EE" stroke-width="1"/>
  <!-- fork lines -->
  <line x1="230" y1="88" x2="490" y2="88" stroke="#1F2937" stroke-width="1"/>
  <line x1="230" y1="88" x2="230" y2="140" stroke="#1F2937" stroke-width="1"/>
  <line x1="360" y1="88" x2="360" y2="140" stroke="#1F2937" stroke-width="1"/>
  <line x1="490" y1="88" x2="490" y2="140" stroke="#1F2937" stroke-width="1"/>
  <!-- agent node bg -->
  <rect x="180" y="140" width="100" height="48" fill="#111827"/>
  <rect x="310" y="140" width="100" height="48" fill="#111827"/>
  <rect x="440" y="140" width="100" height="48" fill="#111827"/>
  <!-- agent node borders -->
  <rect x="180" y="140" width="100" height="48" fill="none" stroke="#64748B" stroke-width="1"/>
  <rect x="310" y="140" width="100" height="48" fill="none" stroke="#22D3EE" stroke-width="1"/>
  <rect x="440" y="140" width="100" height="48" fill="none" stroke="#F59E0B" stroke-width="1"/>
  <!-- output lines -->
  <line x1="230" y1="188" x2="230" y2="222" stroke="#1F2937" stroke-width="1"/>
  <line x1="360" y1="188" x2="360" y2="222" stroke="#1F2937" stroke-width="1"/>
  <line x1="490" y1="188" x2="490" y2="222" stroke="#1F2937" stroke-width="1"/>
  <!-- arrowheads -->
  <polygon points="230,228 225,221 235,221" fill="#1F2937"/>
  <polygon points="360,228 355,221 365,221" fill="#1F2937"/>
  <polygon points="490,228 485,221 495,221" fill="#1F2937"/>
  <!-- result boxes -->
  <rect x="168" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="298" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="428" y="232" width="124" height="22" fill="#111827" stroke="#374151" stroke-width="1"/>
  <!-- bottom rule -->
  <line x1="20" y1="292" x2="700" y2="292" stroke="#1F2937" stroke-width="1"/>
  <!-- text -->
  <text x="360" y="24" font-family="Courier New,Courier,monospace" font-size="10" fill="#374151" letter-spacing="3" text-anchor="middle">APPARATUS DIAGRAM -- EXPERIMENTAL SETUP</text>
  <text x="360" y="68" font-family="Courier New,Courier,monospace" font-size="12" fill="#22D3EE" letter-spacing="2" text-anchor="middle">AMBIGUOUS TASK SPECIFICATION</text>
  <text x="360" y="82" font-family="Courier New,Courier,monospace" font-size="11" fill="#22D3EE" letter-spacing="1" text-anchor="middle">[ IDENTICAL INPUT TO ALL THREE AGENTS ]</text>
  <text x="360" y="118" font-family="Courier New,Courier,monospace" font-size="11" fill="#374151" letter-spacing="3" text-anchor="middle">SIGNAL FLOW</text>
  <text x="230" y="160" font-family="Courier New,Courier,monospace" font-size="11" fill="#64748B" letter-spacing="2" text-anchor="middle">[ ZERO ]</text>
  <text x="230" y="176" font-family="Courier New,Courier,monospace" font-size="11" fill="#64748B" letter-spacing="1" text-anchor="middle">no system prompt</text>
  <text x="360" y="160" font-family="Courier New,Courier,monospace" font-size="11" fill="#22D3EE" letter-spacing="2" text-anchor="middle">[ LIGHT ]</text>
  <text x="360" y="176" font-family="Courier New,Courier,monospace" font-size="11" fill="#22D3EE" letter-spacing="1" text-anchor="middle">3-sentence prompt</text>
  <text x="490" y="160" font-family="Courier New,Courier,monospace" font-size="11" fill="#F59E0B" letter-spacing="2" text-anchor="middle">[ PROFILED ]</text>
  <text x="490" y="176" font-family="Courier New,Courier,monospace" font-size="11" fill="#F59E0B" letter-spacing="1" text-anchor="middle">full character</text>
  <text x="230" y="247" font-family="Courier New,Courier,monospace" font-size="11" fill="#64748B" letter-spacing="1" text-anchor="middle">HEDGES. ASKS.</text>
  <text x="360" y="247" font-family="Courier New,Courier,monospace" font-size="11" fill="#22D3EE" letter-spacing="1" text-anchor="middle">ASKS. WAITS.</text>
  <text x="490" y="247" font-family="Courier New,Courier,monospace" font-size="11" fill="#F59E0B" letter-spacing="1" text-anchor="middle">DECIDES. DOCUMENTS.</text>
  <text x="230" y="270" font-family="Courier New,Courier,monospace" font-size="10" fill="#64748B" letter-spacing="1" text-anchor="middle">JUDGMENT: 6.0</text>
  <text x="360" y="270" font-family="Courier New,Courier,monospace" font-size="10" fill="#22D3EE" letter-spacing="1" text-anchor="middle">JUDGMENT: 6.9</text>
  <text x="490" y="270" font-family="Courier New,Courier,monospace" font-size="11" fill="#F59E0B" letter-spacing="1" text-anchor="middle">JUDGMENT: 8.1</text>
  <text x="360" y="308" font-family="Courier New,Courier,monospace" font-size="10" fill="#94a3b8" letter-spacing="2" text-anchor="middle">HYPOTHESIS: THE PROFILE SUBSTITUTES JUDGMENT FOR HESITATION</text>
</svg>
