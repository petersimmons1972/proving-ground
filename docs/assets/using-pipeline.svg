<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 200">

  <!-- ============================================================
       PAINT ORDER: 1-backgrounds, 2-geometry, 3-strokes, 4-text
       ============================================================ -->

  <!-- 1. BACKGROUNDS -->
  <rect width="720" height="200" fill="#0A0F1E"/>

  <!-- 2. GEOMETRY -->

  <!-- Amber top accent bar -->
  <rect x="0" y="0" width="720" height="4" fill="#F59E0B"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="718" height="198" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Corner registration ticks -->
  <line x1="10" y1="4"  x2="10" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="10" x2="14" y2="10"  stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="4"  x2="710" y2="14"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="10" x2="716" y2="10"  stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="196" x2="10" y2="186"  stroke="#374151" stroke-width="1"/>
  <line x1="4"  y1="190" x2="14" y2="190"  stroke="#374151" stroke-width="1"/>
  <line x1="710" y1="196" x2="710" y2="186"  stroke="#374151" stroke-width="1"/>
  <line x1="706" y1="190" x2="716" y2="190"  stroke="#374151" stroke-width="1"/>

  <!-- Stage box backgrounds -->
  <!-- Stage 1: PROFILE x=20, y=82, w=100, h=56 -->
  <rect x="20" y="82" width="100" height="56" fill="#111827"/>
  <!-- Stage 2: BENCHMARK x=170, y=82, w=120, h=56 -->
  <rect x="170" y="82" width="120" height="56" fill="#111827"/>
  <!-- Stage 3: JUDGE x=340, y=82, w=120, h=56 -->
  <rect x="340" y="82" width="120" height="56" fill="#111827"/>
  <!-- Stage 4: RESULTS x=510, y=82, w=100, h=56 -->
  <rect x="510" y="82" width="100" height="56" fill="#0A0F1E"/>
  <!-- Stage 5: NEXT RUN x=630, y=82, w=70, h=56 -->
  <rect x="630" y="82" width="70" height="56" fill="#0A0F1E"/>

  <!-- Stage borders -->
  <rect x="20" y="82" width="100" height="56" fill="none" stroke="#F59E0B" stroke-width="1"/>
  <rect x="170" y="82" width="120" height="56" fill="none" stroke="#1F2937" stroke-width="1"/>
  <rect x="340" y="82" width="120" height="56" fill="none" stroke="#1F2937" stroke-width="1"/>
  <rect x="510" y="82" width="100" height="56" fill="none" stroke="#22D3EE" stroke-width="1"/>
  <!-- Stage 5: dashed border -->
  <rect x="630" y="82" width="70" height="56" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Connecting arrows between stages
       Arrow = horizontal line + filled triangle at destination
       Stage1 right edge x=120, Stage2 left edge x=170 -- connector at y=110
       Arrow 1-2: line x=120 to x=163, then arrowhead at x=170 -->
  <line x1="120" y1="110" x2="163" y2="110" stroke="#374151" stroke-width="1"/>
  <polygon points="170,110 162,106 162,114" fill="#374151"/>

  <!-- Arrow 2-3: line x=290 to x=333, y=110 -->
  <line x1="290" y1="110" x2="333" y2="110" stroke="#374151" stroke-width="1"/>
  <polygon points="340,110 332,106 332,114" fill="#374151"/>

  <!-- Arrow 3-4: cyan (approaching RESULTS), line x=460 to x=503, y=110 -->
  <line x1="460" y1="110" x2="503" y2="110" stroke="#22D3EE" stroke-width="1"/>
  <polygon points="510,110 502,106 502,114" fill="#22D3EE"/>

  <!-- Arrow 4-5: line x=610 to x=623, y=110 -->
  <line x1="610" y1="110" x2="623" y2="110" stroke="#374151" stroke-width="1"/>
  <polygon points="630,110 622,106 622,114" fill="#374151"/>

  <!-- Bottom rule -->
  <line x1="20" y1="173" x2="700" y2="173" stroke="#1F2937" stroke-width="1"/>

  <!-- 3. STROKES -- embedded above -->

  <!-- 4. TEXT -- always last -->

  <!-- Header -->
  <text x="360" y="24" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="3" fill="#374151" text-anchor="middle">
    EXECUTION PIPELINE -- FULL SUITE RUN
  </text>

  <!-- Stage 1: PROFILE -->
  <text x="70" y="106" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="middle">
    PROFILE
  </text>
  <text x="70" y="120" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#F59E0B" text-anchor="middle">
    YOUR AGENT
  </text>

  <!-- Stage 2: BENCHMARK ENGINE -->
  <text x="230" y="100" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#94a3b8" text-anchor="middle">
    BENCHMARK
  </text>
  <text x="230" y="114" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#94a3b8" text-anchor="middle">
    ENGINE
  </text>
  <text x="230" y="128" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    10 TASKS x 3 CONFIGS
  </text>

  <!-- Stage 3: JUDGE SCORING -->
  <text x="400" y="100" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#94a3b8" text-anchor="middle">
    JUDGE
  </text>
  <text x="400" y="114" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#94a3b8" text-anchor="middle">
    SCORING
  </text>
  <text x="400" y="128" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    3 RUNS / MEDIAN
  </text>

  <!-- Below stage 3: AUTOMATED + LLM -->
  <text x="400" y="152" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    AUTOMATED + LLM
  </text>

  <!-- Stage 4: RESULTS -->
  <text x="560" y="100" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    RESULTS
  </text>
  <text x="560" y="114" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#22D3EE" text-anchor="middle">
    HTML + JSON
  </text>
  <text x="560" y="128" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    history.jsonl
  </text>

  <!-- Stage 5: NEXT RUN -->
  <text x="665" y="106" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    NEXT
  </text>
  <text x="665" y="120" font-family="Courier New, Courier, monospace" font-size="11"
        letter-spacing="1" fill="#64748B" text-anchor="middle">
    RUN
  </text>

  <!-- Bottom stats line -->
  <text x="360" y="188" font-family="Courier New, Courier, monospace" font-size="10"
        letter-spacing="2" fill="#64748B" text-anchor="middle">
    EACH FULL RUN: 30 EXECUTIONS -- 90 JUDGE EVALUATIONS -- ~$15-40
  </text>

</svg>
